<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Global Marketing Team · Q1 2026 OKR Review</title>
<script src="https://cdn.jsdelivr.net/npm/ogl/dist/ogl.umd.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.15.3/umd/Recharts.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',-apple-system,sans-serif;background:#0a0606;color:#dce3f0;-webkit-font-smoothing:antialiased;overflow-x:hidden}

  /* Noise texture overlay */
  body::before{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity:0.4;mix-blend-mode:overlay}

  /* Dot grid background */
  body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
    background-image:radial-gradient(circle,rgba(255,255,255,0.02) 1px,transparent 1px);
    background-size:40px 40px}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(212,64,64,0.15);border-radius:2px}
  .prism-container{position:relative;width:100%;height:100%}

  /* Editable */
  [contenteditable]{outline:none;cursor:text;border-radius:3px;transition:background 0.2s,box-shadow 0.2s}
  [contenteditable]:hover{background:rgba(212,64,64,0.05)}
  [contenteditable]:focus{background:rgba(212,64,64,0.08);box-shadow:inset 0 0 0 1px rgba(212,64,64,0.25)}

  /* ═══ All animations: compositor-only (transform + opacity) ═══ */

  /* Section reveal */
  .sec-anim{opacity:0;transform:translateY(36px);will-change:transform,opacity}
  section.vis .sec-anim{animation:revealUp 0.9s cubic-bezier(0.16,1,0.3,1) both}
  section.vis .sec-anim.d1{animation-delay:.06s}section.vis .sec-anim.d2{animation-delay:.12s}
  section.vis .sec-anim.d3{animation-delay:.18s}section.vis .sec-anim.d4{animation-delay:.24s}
  section.vis .sec-anim.d5{animation-delay:.3s}section.vis .sec-anim.d6{animation-delay:.36s}
  section.vis .sec-anim.d7{animation-delay:.42s}section.vis .sec-anim.d8{animation-delay:.48s}

  @keyframes revealUp{
    0%{opacity:0;transform:translateY(36px)}
    70%{opacity:1;transform:translateY(-3px)}
    100%{opacity:1;transform:translateY(0)}
  }

  /* KR card reveal */
  .kr-card{opacity:0;transform:translateY(20px);will-change:transform,opacity}
  section.vis .kr-card{animation:cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both}
  section.vis .kr-card:nth-child(1){animation-delay:.15s}
  section.vis .kr-card:nth-child(2){animation-delay:.25s}
  section.vis .kr-card:nth-child(3){animation-delay:.35s}

  @keyframes cardIn{
    0%{opacity:0;transform:translateY(20px)}
    60%{opacity:1;transform:translateY(-2px)}
    100%{opacity:1;transform:translateY(0)}
  }

  /* Expanded content */
  @keyframes expandReveal{
    0%{opacity:0;transform:translateY(-8px)}
    100%{opacity:1;transform:translateY(0)}
  }
  .kr-expanded{animation:expandReveal 0.45s cubic-bezier(0.16,1,0.3,1) both;overflow:hidden}

  /* Metric card pop */
  @keyframes metricPop{
    0%{opacity:0;transform:translateY(14px) scale(0.96)}
    65%{opacity:1;transform:translateY(-2px) scale(1.015)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }

  /* Shimmer text (title accent) */
  .shimmer-text{
    background:linear-gradient(90deg,#dce3f0 0%,#E8585A 25%,#dce3f0 50%,#E8585A 75%,#dce3f0 100%);
    background-size:200% 100%;
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmerMove 4s ease-in-out infinite;
  }
  @keyframes shimmerMove{0%{background-position:200% 0}100%{background-position:-200% 0}}
  @keyframes ldrSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  @keyframes neonPulse{0%,100%{opacity:1;filter:drop-shadow(0 0 8px rgba(212,64,64,0.6)) drop-shadow(0 0 24px rgba(200,30,30,0.3))}50%{opacity:0.92;filter:drop-shadow(0 0 14px rgba(212,64,64,0.8)) drop-shadow(0 0 36px rgba(200,30,30,0.45))}}
  @keyframes neonBorder{0%,100%{border-color:rgba(212,64,64,0.25);box-shadow:0 0 12px rgba(212,64,64,0.15),inset 0 0 12px rgba(212,64,64,0.05)}50%{border-color:rgba(212,64,64,0.4);box-shadow:0 0 20px rgba(212,64,64,0.25),inset 0 0 20px rgba(212,64,64,0.08)}}

  .dash-page{opacity:0;transform:translateY(50px) scale(0.97);transition:opacity 0.8s cubic-bezier(0.16,1,0.3,1),transform 0.8s cubic-bezier(0.16,1,0.3,1)}
  .dash-page.vis{opacity:1;transform:translateY(0) scale(1)}
  .dash-page .dash-child{opacity:0;transform:translateY(30px);transition:opacity 0.6s cubic-bezier(0.16,1,0.3,1),transform 0.6s cubic-bezier(0.16,1,0.3,1)}
  .dash-page.vis .dash-child{opacity:1;transform:translateY(0)}
  .dash-page.vis .dash-child:nth-child(1){transition-delay:0.1s}
  .dash-page.vis .dash-child:nth-child(2){transition-delay:0.2s}
  .dash-page.vis .dash-child:nth-child(3){transition-delay:0.3s}
  .dash-page.vis .dash-child:nth-child(4){transition-delay:0.4s}

  /* Glow card — edge light trace */
  .glow-card{
    transition:border-color 0.4s cubic-bezier(0.16,1,0.3,1),box-shadow 0.4s cubic-bezier(0.16,1,0.3,1),transform 0.4s cubic-bezier(0.16,1,0.3,1);
    will-change:transform,box-shadow;position:relative;overflow:hidden
  }
  .glow-card::before{
    content:'';position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;border-radius:18px;
    background:conic-gradient(from 0deg,transparent 0%,rgba(212,64,64,0.2) 8%,rgba(232,88,90,0.1) 12%,transparent 20%,transparent 50%,rgba(212,64,64,0.12) 58%,rgba(232,88,90,0.06) 62%,transparent 70%);
    opacity:0;transition:opacity 0.6s;pointer-events:none;z-index:0;
    animation:edgeGlowSpin 6s linear infinite paused
  }
  .glow-card:hover::before{opacity:1;animation-play-state:running}
  .glow-card:hover{
    border-color:rgba(212,64,64,0.25)!important;
    box-shadow:0 0 20px rgba(212,64,64,0.08),0 0 60px rgba(212,64,64,0.04),0 8px 30px rgba(0,0,0,0.4);
    transform:translateY(-3px)
  }
  .glow-card>*{position:relative;z-index:1}
  @keyframes edgeGlowSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  /* Glassmorphism base for content cards */
  .glass-card{
    background:rgba(220,40,40,0.03);
    backdrop-filter:blur(20px) saturate(1.3);
    -webkit-backdrop-filter:blur(20px) saturate(1.3);
    border:1px solid rgba(212,64,64,0.1);
    border-radius:16px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.04);
    transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
    position:relative;overflow:hidden
  }
  .glass-card::after{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
    pointer-events:none;z-index:2
  }
  .glass-card:hover{
    background:rgba(220,40,40,0.06);
    border-color:rgba(212,64,64,0.2);
    box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 30px rgba(212,64,64,0.06),inset 0 1px 0 rgba(255,255,255,0.06);
    transform:translateY(-4px)
  }

  /* Edge glow pulse for metric cards */
  .edge-glow{position:relative;overflow:hidden}
  .edge-glow::before{
    content:'';position:absolute;top:-1px;left:-1px;right:-1px;bottom:-1px;border-radius:inherit;
    background:linear-gradient(135deg,rgba(212,64,64,0.18),transparent 30%,transparent 70%,rgba(232,88,90,0.12));
    opacity:0;transition:opacity 0.5s;pointer-events:none;z-index:0
  }
  .edge-glow:hover::before{opacity:1}

  /* Text glow for headings */
  .text-glow{
    text-shadow:0 0 20px rgba(212,64,64,0.3),0 0 40px rgba(212,64,64,0.1)
  }

  /* Pulse ring animation for status dots */
  @keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(212,64,64,0.4)}70%{box-shadow:0 0 0 8px rgba(212,64,64,0)}100%{box-shadow:0 0 0 0 rgba(212,64,64,0)}}
  .pulse-dot{animation:pulseRing 2s ease-in-out infinite}

  /* Floating animation for decorative elements */
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .float-anim{animation:float 4s ease-in-out infinite}

  /* Animated gradient border (KPI hero cards) */
  .kpi-card{
    position:relative;overflow:hidden
  }
  .kpi-card::before{
    content:'';position:absolute;inset:-1px;border-radius:15px;padding:1px;
    background:linear-gradient(135deg,rgba(212,64,64,0.3),transparent 40%,transparent 60%,rgba(232,88,90,0.2));
    -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    animation:borderFlow 4s linear infinite;pointer-events:none;z-index:0
  }
  .kpi-card>*{position:relative;z-index:1}
  @keyframes borderFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

  /* Number glow pulse */
  .num-glow{
    text-shadow:0 0 20px rgba(232,88,90,0.3),0 0 40px rgba(232,88,90,0.1);
    animation:numPulse 3s ease-in-out infinite
  }
  @keyframes numPulse{0%,100%{text-shadow:0 0 20px rgba(232,88,90,0.3),0 0 40px rgba(232,88,90,0.1)}50%{text-shadow:0 0 30px rgba(232,88,90,0.5),0 0 60px rgba(232,88,90,0.2)}}

  /* Section title gradient text */
  .title-gradient{
    background:linear-gradient(135deg,#dce3f0 0%,#8baddb 50%,#dce3f0 100%);
    background-size:200% 100%;
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:titleShimmer 5s ease-in-out infinite
  }
  @keyframes titleShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Animated underline for section headers */
  .sec-underline{position:relative;display:inline-block}
  .sec-underline::after{
    content:'';position:absolute;bottom:-6px;left:50%;width:0;height:2px;
    background:linear-gradient(90deg,transparent,rgba(212,64,64,0.6),rgba(232,88,90,0.4),transparent);
    transition:width 0.8s cubic-bezier(0.16,1,0.3,1),left 0.8s cubic-bezier(0.16,1,0.3,1)
  }
  section.vis .sec-underline::after{width:100px;left:calc(50% - 50px)}

  /* Metric card animated accent bar */
  .metric-card{position:relative;overflow:hidden}
  .metric-card::after{
    content:'';position:absolute;top:0;left:0;width:0;height:2px;
    background:linear-gradient(90deg,rgba(212,64,64,0.5),rgba(232,88,90,0.3));
    transition:width 0.5s cubic-bezier(0.16,1,0.3,1)
  }
  .metric-card:hover::after{width:100%}

  /* Nav active pill animated border */
  .nav-pill.active{position:relative;overflow:hidden}
  .nav-pill.active::before{
    content:'';position:absolute;bottom:0;left:0;width:100%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(212,64,64,0.5),transparent);
    animation:navLine 2s ease-in-out infinite
  }
  @keyframes navLine{0%,100%{opacity:0.3;transform:scaleX(0.5)}50%{opacity:1;transform:scaleX(1)}}

  /* Gradient separator */
  .section-sep{height:1px;background:linear-gradient(90deg,transparent,rgba(212,64,64,0.25) 30%,rgba(212,64,64,0.4) 50%,rgba(212,64,64,0.25) 70%,transparent);margin:20px auto;max-width:500px}



  /* Nav */
  .top-nav{
    position:sticky;top:0;z-index:200;
    background:rgba(10,6,6,0.75);
    backdrop-filter:blur(24px) saturate(1.2);
    -webkit-backdrop-filter:blur(24px) saturate(1.2);
    border-bottom:1px solid transparent;
    transition:background 0.4s,border-color 0.4s,box-shadow 0.4s
  }
  .top-nav.scrolled{
    background:rgba(10,6,6,0.95);
    border-bottom-color:rgba(212,64,64,0.1);
    box-shadow:0 4px 30px rgba(0,0,0,0.4)
  }

  /* Nav pill */
  .nav-pill{
    padding:7px 14px;border-radius:20px;font-size:12px;
    text-decoration:none;cursor:pointer;font-family:'Inter',sans-serif;
    border:1px solid transparent;
    transition:all 0.3s cubic-bezier(0.16,1,0.3,1)
  }
  .nav-pill:hover{background:rgba(212,64,64,0.06)!important}
  .nav-pill.active{
    color:#fff;background:rgba(212,64,64,0.15);
    border-color:rgba(212,64,64,0.3);
    box-shadow:0 0 16px rgba(212,64,64,0.08);
    animation:glowPulse 3s ease-in-out infinite
  }
  .nav-pill:not(.active){color:rgba(255,255,255,0.35)}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(212,64,64,0)}50%{box-shadow:0 0 16px 2px rgba(212,64,64,0.12)}}

  /* Chevron */
  .chevron{
    display:inline-flex;align-items:center;justify-content:center;
    width:30px;height:30px;border-radius:8px;
    background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
    transition:transform 0.4s cubic-bezier(0.16,1,0.3,1),background 0.25s,box-shadow 0.3s;
    flex-shrink:0
  }
  .chevron:hover{background:rgba(212,64,64,0.08);box-shadow:0 0 10px rgba(212,64,64,0.1)}
  .chevron.open{transform:rotate(180deg)}
  .chevron svg{width:14px;height:14px;stroke:rgba(255,255,255,0.4);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Hero KPI cards */
  .kpi-card{
    padding:18px 22px;border-radius:14px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    backdrop-filter:blur(8px);
    transition:border-color 0.3s,box-shadow 0.3s,transform 0.3s cubic-bezier(0.16,1,0.3,1)
  }
  .kpi-card:hover{
    border-color:rgba(212,64,64,0.2);
    box-shadow:0 0 20px rgba(212,64,64,0.1);
    transform:translateY(-3px)
  }

  /* Metric card */
  .metric-card{
    background:#0e1320;border-radius:10px;padding:16px;
    transition:border-color 0.35s,box-shadow 0.35s,transform 0.35s cubic-bezier(0.16,1,0.3,1)
  }
  .metric-card:hover{
    border-color:rgba(212,64,64,0.25)!important;
    box-shadow:0 0 16px rgba(212,64,64,0.06);
    transform:translateY(-2px)
  }

  /* Keyframes */
  @keyframes heroTextIn{0%{opacity:0;transform:translateY(35px) scale(0.96)}100%{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes heroContentIn{0%{opacity:0;transform:translateY(20px) scale(0.98);filter:blur(8px)}100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0px)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
  @keyframes fadeUp{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes scrollDot{0%{transform:translateY(0);opacity:1}100%{transform:translateY(8px);opacity:0}}

  /* StarBorder animated border */
  .star-border-container{display:inline-block;position:relative;border-radius:16px;overflow:hidden}
  .border-gradient-bottom{position:absolute;width:300%;height:50%;opacity:0.7;bottom:-12px;right:-250%;border-radius:50%;animation:star-movement-bottom linear infinite alternate;z-index:0}
  .border-gradient-top{position:absolute;opacity:0.7;width:300%;height:50%;top:-12px;left:-250%;border-radius:50%;animation:star-movement-top linear infinite alternate;z-index:0}
  .inner-content{position:relative;border:1px solid rgba(212,64,64,0.15);background:rgba(10,6,6,0.98);color:#dce3f0;font-size:16px;text-align:center;padding:0;border-radius:16px;z-index:1}
  @keyframes star-movement-bottom{0%{transform:translate(0%,0%);opacity:1}100%{transform:translate(-100%,0%);opacity:0}}
  @keyframes star-movement-top{0%{transform:translate(0%,0%);opacity:1}100%{transform:translate(100%,0%);opacity:0}}

  /* Login input */
  .login-input{width:100%;padding:13px 18px;border-radius:10px;border:1px solid rgba(200,60,60,0.1);background:rgba(255,255,255,0.03);color:#e8dcd4;font-size:14px;outline:none;font-family:'Inter',sans-serif;box-sizing:border-box;transition:border-color 0.3s,box-shadow 0.3s}
  .login-input:focus{border-color:rgba(212,64,64,0.35);box-shadow:0 0 16px rgba(212,64,64,0.1)}
  .login-input::placeholder{color:rgba(228,160,160,0.25)}
  .login-input.error{border-color:rgba(232,88,90,0.5);box-shadow:0 0 12px rgba(232,88,90,0.12)}

  /* Save bar — toolbar */
  .save-bar{position:fixed;bottom:28px;right:28px;z-index:300;display:flex;flex-direction:column;align-items:flex-end;gap:0}
  .gear-btn{width:48px;height:48px;border-radius:50%;border:1px solid rgba(212,64,64,0.25);background:rgba(20,10,10,0.85);backdrop-filter:blur(16px);color:#E8585A;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:10px;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:0 4px 24px rgba(0,0,0,0.4)}
  .gear-btn:hover{background:rgba(212,64,64,0.15);border-color:rgba(212,64,64,0.5);transform:scale(1.08)}
  .toolbar-btn{padding:10px 20px;border-radius:8px;border:1px solid rgba(212,64,64,0.2);background:rgba(20,10,10,0.9);backdrop-filter:blur(16px);color:#e8dcd4;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);white-space:nowrap}
  .toolbar-btn:hover{background:rgba(212,64,64,0.15);border-color:rgba(212,64,64,0.4);transform:translateY(-2px);box-shadow:0 4px 16px rgba(212,64,64,0.1)}
  .toolbar-group{display:flex;gap:8px;transform-origin:bottom right;transition:all 0.35s cubic-bezier(0.16,1,0.3,1);overflow:hidden}
  .toolbar-group:not(.open){max-height:0;opacity:0;transform:scale(0.8) translateY(10px);pointer-events:none}
  .toolbar-group.open{max-height:100px;opacity:1;transform:scale(1) translateY(0)}

  /* Edit mode */
  .edit-mode-on{outline:2px solid rgba(212,64,64,0.15);outline-offset:-2px}
  .edit-section{position:relative}
  .edit-section::before{content:'';position:absolute;inset:-4px;border:1.5px dashed rgba(212,64,64,0.15);border-radius:12px;pointer-events:none;opacity:0;transition:opacity 0.3s}
  .edit-mode-on .edit-section::before{opacity:1}
  .edit-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.25s;font-family:'Inter',sans-serif;border:1px solid;letter-spacing:0.02em}
  .edit-btn-add{border-color:rgba(212,64,64,0.3);background:rgba(212,64,64,0.08);color:#E8585A}
  .edit-btn-add:hover{background:rgba(212,64,64,0.15);border-color:rgba(212,64,64,0.5);transform:translateY(-1px)}
  .edit-btn-del{border-color:rgba(248,113,113,0.2);background:rgba(248,113,113,0.06);color:#f87171;padding:4px 8px;font-size:10px}
  .edit-btn-del:hover{background:rgba(248,113,113,0.15);border-color:rgba(248,113,113,0.4)}
  .edit-form{display:flex;gap:8px;align-items:center;padding:12px 16px;background:rgba(212,64,64,0.04);border:1px dashed rgba(212,64,64,0.2);border-radius:10px;margin:8px 0;animation:fadeUp 0.3s ease both}
  .edit-form input{padding:8px 12px;border-radius:7px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#dce3f0;font-size:12px;outline:none;font-family:'Inter',sans-serif;transition:border-color 0.2s}
  .edit-form input:focus{border-color:rgba(212,64,64,0.35)}
  .edit-form input::placeholder{color:rgba(255,255,255,0.2)}

  /* Confirm dialog */

function DashboardSection({editMode}) {
  const wrapRef = useRef(null);
  useEffect(() => {
    if (!wrapRef.current) return;
    const pages = wrapRef.current.querySelectorAll('.dash-page');

      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });

    pages.forEach(p => obs.observe(p));

    <div ref={wrapRef} style={{position:'relative', background:'#0a0000', overflow:'hidden'}}>

        <div style={{position:'absolute', top:'-5%', right:'20%', width:200, height:'150vh', background:'linear-gradient(to bottom, rgba(248,113,113,0.4), rgba(127,29,29,0.1), transparent)', transform:'rotate(45deg)', transformOrigin:'top', filter:'blur(36px)'}}/>
        <div style={{position:'absolute', top:'5%', right:'10%', width:100, height:'150vh', background:'linear-gradient(to bottom, rgba(252,165,165,0.2), transparent)', transform:'rotate(55deg)', transformOrigin:'top', filter:'blur(36px)'}}/>
        <div style={{position:'absolute', top:'-10%', right:'35%', width:150, height:'150vh', background:'linear-gradient(to bottom, rgba(239,68,68,0.4), rgba(127,29,29,0.2), transparent)', transform:'rotate(-25deg)', transformOrigin:'top', filter:'blur(24px)'}}/>

      <div style={{position:'relative', zIndex:10, width:'100%'}}>
        {DASHBOARDS.map((board) => {
          if (board.layoutType === 'profit') {
            return <div key={board.id} className="dash-page"><ProfitSection data={board} count={DASHBOARDS.length} editMode={editMode}/></div>;
          }
          if (board.layoutType === 'region_table') {
            return <div key={board.id} className="dash-page"><RegionTableSection data={board} count={DASHBOARDS.length} editMode={editMode}/></div>;

        })}
      </div>
    </div>
  );
}

// ═══ Prism (play once then freeze — zero continuous rendering) ═══
function Prism({height=3.5,baseWidth=5.5,animationType='rotate',glow=1,offset={x:0,y:0},noise=0.5,transparent=true,scale=3.6,hueShift=0,colorFrequency=1,hoverStrength=2,inertia=0.05,bloom=1,timeScale=0.5,playDuration=6}){
  const ref=useRef(null);
  useEffect(()=>{
    const c=ref.current;if(!c||typeof ogl==='undefined')return;
    const{Renderer,Triangle,Program,Mesh}=ogl;
    const H=Math.max(.001,height),BW=Math.max(.001,baseWidth),BH=BW*.5,G=Math.max(0,glow),N=Math.max(0,noise),ox=offset?.x??0,oy=offset?.y??0;
    const SAT=transparent?1.5:1,SC=Math.max(.001,scale),HU=hueShift||0,CF=Math.max(0,colorFrequency||1),BL=Math.max(0,bloom||1),TS=Math.max(0,timeScale||1);
    const dpr=Math.min(1.5,window.devicePixelRatio||1);
    const r=new Renderer({dpr,alpha:transparent,antialias:false});const gl=r.gl;gl.disable(gl.DEPTH_TEST);gl.disable(gl.CULL_FACE);gl.disable(gl.BLEND);
    Object.assign(gl.canvas.style,{position:'absolute',inset:'0',width:'100%',height:'100%',display:'block'});c.appendChild(gl.canvas);
    const vt=`attribute vec2 position;void main(){gl_Position=vec4(position,0.0,1.0);}`;
    const fg=`precision highp float;uniform vec2 iResolution;uniform float iTime,uHeight,uBaseHalf,uGlow,uNoise,uSaturation,uScale,uHueShift,uColorFreq,uBloom,uCenterShift,uInvBaseHalf,uInvHeight,uMinAxis,uPxScale,uTimeScale;uniform vec2 uOffsetPx;uniform mat3 uRot;uniform int uUseBaseWobble;
    vec4 t4(vec4 x){vec4 e=exp(2.0*x);return(e-1.0)/(e+1.0);}float rnd(vec2 co){return fract(sin(dot(co,vec2(12.9898,78.233)))*43758.5453);}
    float sdO(vec3 p){vec3 q=vec3(abs(p.x)*uInvBaseHalf,abs(p.y)*uInvHeight,abs(p.z)*uInvBaseHalf);return(q.x+q.y+q.z-1.0)*uMinAxis*0.577;}
    float sdP(vec3 p){return max(sdO(p),-p.y);}
    mat3 hR(float a){float c=cos(a),s=sin(a);mat3 W=mat3(.299,.587,.114,.299,.587,.114,.299,.587,.114);mat3 U=mat3(.701,-.587,-.114,-.299,.413,-.114,-.3,-.588,.886);mat3 V=mat3(.168,-.331,.5,.328,.035,-.5,-.497,.296,.201);return W+U*c+V*s;}
    void main(){vec2 f=(gl_FragCoord.xy-0.5*iResolution.xy-uOffsetPx)*uPxScale;float z=5.0,d=0.0;vec3 p;vec4 o=vec4(0.0);mat2 w=mat2(1.0);if(uUseBaseWobble==1){float t=iTime*uTimeScale;w=mat2(cos(t),cos(t+33.0),cos(t+11.0),cos(t));}for(int i=0;i<60;i++){p=vec3(f,z);p.xz=p.xz*w;p=uRot*p;vec3 q=p;q.y+=uCenterShift;d=0.1+0.2*abs(sdP(q));z-=d;o+=(sin((p.y+z)*uColorFreq+vec4(0,1,2,3))+1.0)/d;}o=t4(o*o*(uGlow*uBloom)/1e5);vec3 col=o.rgb;col+=(rnd(gl_FragCoord.xy+vec2(iTime))-0.5)*uNoise;col=clamp(col,0.0,1.0);float L=dot(col,vec3(.2126,.7152,.0722));col=clamp(mix(vec3(L),col,uSaturation),0.0,1.0);if(abs(uHueShift)>.0001)col=clamp(hR(uHueShift)*col,0.0,1.0);gl_FragColor=vec4(col,o.a);}`;
    const geo=new Triangle(gl),iR=new Float32Array(2),oP=new Float32Array(2);
    const prog=new Program(gl,{vertex:vt,fragment:fg,uniforms:{iResolution:{value:iR},iTime:{value:0},uHeight:{value:H},uBaseHalf:{value:BH},uUseBaseWobble:{value:1},uRot:{value:new Float32Array([1,0,0,0,1,0,0,0,1])},uGlow:{value:G},uOffsetPx:{value:oP},uNoise:{value:N},uSaturation:{value:SAT},uScale:{value:SC},uHueShift:{value:HU},uColorFreq:{value:CF},uBloom:{value:BL},uCenterShift:{value:H*.25},uInvBaseHalf:{value:1/BH},uInvHeight:{value:1/H},uMinAxis:{value:Math.min(BH,H)},uPxScale:{value:1/((gl.drawingBufferHeight||1)*.1*SC)},uTimeScale:{value:TS}}});
    const mesh=new Mesh(gl,{geometry:geo,program:prog});
    const resize=()=>{const w=c.clientWidth||1,h=c.clientHeight||1;r.setSize(w,h);iR[0]=gl.drawingBufferWidth;iR[1]=gl.drawingBufferHeight;oP[0]=ox*dpr;oP[1]=oy*dpr;prog.uniforms.uPxScale.value=1/((gl.drawingBufferHeight||1)*.1*SC);};
    const ro=new ResizeObserver(resize);ro.observe(c);resize();
    const rB=new Float32Array(9);const sM=(y,p,rl,o)=>{const cy=Math.cos(y),sy=Math.sin(y),cx=Math.cos(p),sx=Math.sin(p),cz=Math.cos(rl),sz=Math.sin(rl);o[0]=cy*cz+sy*sx*sz;o[1]=cx*sz;o[2]=-sy*cz+cy*sx*sz;o[3]=-cy*sz+sy*sx*cz;o[4]=cx*cz;o[5]=sy*sz+cy*sx*cz;o[6]=sy*cx;o[7]=-sx;o[8]=cy*cx;return o;};
    let raf=0,t0=performance.now(),done=false;
    const R=Math.random;const wX=.3+R()*.6,wY=.2+R()*.7,wZ=.1+R()*.5,phX=R()*Math.PI*2,phZ=R()*Math.PI*2;

    const draw=t=>{
      if(done)return;
      const tm=(t-t0)*.001;
      prog.uniforms.iTime.value=tm;
      if(animationType==='3drotate'){const ts=tm*TS;const yaw=ts*wY,pitch=Math.sin(ts*wX+phX)*.6,roll=Math.sin(ts*wZ+phZ)*.5;sM(yaw,pitch,roll,rB);prog.uniforms.uRot.value=rB;}
      else{rB[0]=1;rB[1]=0;rB[2]=0;rB[3]=0;rB[4]=1;rB[5]=0;rB[6]=0;rB[7]=0;rB[8]=1;prog.uniforms.uRot.value=rB;}
      r.render({scene:mesh});
      // Freeze after playDuration — render final frame then stop
      if(tm<playDuration)raf=requestAnimationFrame(draw);
      else{done=true;raf=0;}
    };
    raf=requestAnimationFrame(draw);
    ro.observe(c);
    return()=>{if(raf)cancelAnimationFrame(raf);ro.disconnect();if(gl.canvas.parentElement===c)c.removeChild(gl.canvas);};
  },[]);
  return <div className="prism-container" ref={ref}/>;

function AddItemForm({fields,onSubmit,label}){
  const[vals,setVals]=useState(()=>{const o={};fields.forEach(f=>o[f.key]='');return o;});
  const set=(k,v)=>setVals(p=>({...p,[k]:v}));
  return <div className="edit-form">
    {fields.map(f=><input key={f.key} placeholder={f.placeholder} value={vals[f.key]} onChange={e=>set(f.key,e.target.value)}/>)}

}

// ═══ Hero ═══
function HeroSection({data,editMode,addHeroKpi,delHeroKpi,sectionRef}){
  const ro=!editMode;
  const[vidDone,setVidDone]=useState(false);
  const vidRef=useRef(null);
  const heroRef=useRef(null);

  useEffect(()=>{
    const v=vidRef.current;if(!v)return;
    const onTime=()=>{if(v.currentTime>=6&&!vidDone)setVidDone(true);if(v.currentTime>=8){v.currentTime=0;v.play();}};
    v.addEventListener('timeupdate',onTime);
    const fallback=setTimeout(()=>setVidDone(true),7000);
    return ()=>{v.removeEventListener('timeupdate',onTime);clearTimeout(fallback);};
  },[vidDone]);

  // Scroll-driven height: 90vh → 100vh over 200px scroll (direct DOM, no React state)
  useEffect(()=>{
    let ticking=false;
    const onScroll=()=>{
      if(ticking)return;
      ticking=true;
      requestAnimationFrame(()=>{
        const el=heroRef.current;if(!el)return;
        const s=Math.min(window.scrollY/200,1);
        el.style.height=(90+s*10)+'vh';
        ticking=false;
      });
    };
    window.addEventListener('scroll',onScroll,{passive:true});
    return()=>window.removeEventListener('scroll',onScroll);
  },[]);

  // Hero video sound: scroll-only interaction to unmute when visible
  useEffect(()=>{
    const v=vidRef.current;const el=heroRef.current;if(!v||!el)return;
    let interacted=false;
    const onScroll=()=>{if(!interacted){interacted=true;window.removeEventListener('scroll',scrollHandler);}};
    const scrollHandler=onScroll;
    window.addEventListener('scroll',scrollHandler,{passive:true});
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(interacted&&e.isIntersecting){v.muted=false;v.volume=0.3;}
        else{v.muted=true;}
      });
    },{threshold:0.3});
    obs.observe(el);
    return()=>{window.removeEventListener('scroll',scrollHandler);obs.disconnect();};
  },[]);

  const fadeIn=vidDone?'heroContentIn 1.4s cubic-bezier(0.16,1,0.3,1) both':'none';
  const fadeInSlow=vidDone?'heroContentIn 1.4s cubic-bezier(0.16,1,0.3,1) 0.4s both':'none';
  const fadeInKpi=vidDone?'heroContentIn 1.4s cubic-bezier(0.16,1,0.3,1) 0.6s both':'none';
  const titleText=data.heroTitle||'VANTAGE';

// ═══ Nav ═══
function TopNav({active}){
  const navRef=useRef(null);
  useEffect(()=>{
    const nav=navRef.current;if(!nav)return;let ticking=false;
    const fn=()=>{if(!ticking){requestAnimationFrame(()=>{nav.classList.toggle('scrolled',window.scrollY>window.innerHeight*.7);ticking=false;});ticking=true;}};
    window.addEventListener('scroll',fn,{passive:true});return()=>window.removeEventListener('scroll',fn);
  },[]);
  const items=[{id:'o1',label:'O1',full:'品牌'},{id:'o2',label:'O2',full:'增长'},{id:'o3',label:'O3',full:'突破'}];
  return(
    <nav ref={navRef} className="top-nav">
      <div style={{width:'100%',padding:'0 48px',display:'flex',alignItems:'center',height:52,justifyContent:'space-between'}}>
        <a href="#hero" onClick={e=>{e.preventDefault();document.getElementById('hero')?.scrollIntoView({behavior:'smooth'});}} style={{textDecoration:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
          <img src="vantage-logo.svg" style={{height:22}}/>
          <span style={{fontSize:9,color:'rgba(212,64,64,0.4)',fontFamily:T.font.en,letterSpacing:'0.08em'}}>Q1 OKR</span>
        </a>
        <div style={{display:'flex',gap:3}}>
          {items.map(it=><a key={it.id} href={`#${it.id}`} onClick={e=>{e.preventDefault();document.getElementById(it.id)?.scrollIntoView({behavior:'smooth'});}} className={`nav-pill${active===it.id?' active':''}`}>{it.label}{it.full&&<span style={{fontSize:9,opacity:0.4,fontFamily:T.font.en,marginLeft:4,display:'none'}}>{it.full}</span>}</a>)}

      </div>
    </nav>
  );
}

// ═══ Login Overlay ═══
function LoginOverlay({onLogin}){
  const [user,setUser]=useState('vantage');
  const [pass,setPass]=useState('vantage');
  const [error,setError]=useState(false);
  const [shaking,setShaking]=useState(false);
  const [loading,setLoading]=useState(false);
  const [loadProgress,setLoadProgress]=useState('');
  const passRef=useRef(null);

  const submit=()=>{
    if(loading) return;
    if(user==='vantage'&&pass==='vantage'){
      sessionStorage.setItem('vantage-auth','ok');
      setLoading(true);
      setLoadProgress('正在加载视频资源...');
      // Preload hero video
      const v=document.createElement('video');
      v.src='hero-bg.mp4';
      v.preload='auto';
      let done=false;
      const finish=()=>{if(done)return;done=true;onLogin();};
      v.addEventListener('canplaythrough',finish);
      v.addEventListener('error',finish);
      setTimeout(finish,12000);
      v.load();
    } else {
      setError(true);setShaking(true);
      setTimeout(()=>setError(false),3000);
      setTimeout(()=>setShaking(false),500);
    }
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:99999,background:'#0a0a0a',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Inter,sans-serif'}}>
      {/* Ink wash ambient background */}
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 40%,rgba(200,30,30,0.08) 0%,transparent 60%)'}}/>
      <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(circle,rgba(200,60,60,0.03) 1px,transparent 1px)',backgroundSize:'48px 48px'}}/>

      {/* Glassmorphism card */}
      <div style={{animation:loading?'none':'heroTextIn 0.8s cubic-bezier(0.16,1,0.3,1) both',transform:shaking?'translateX(-8px)':'none',transition:'transform 0.1s',background:'rgba(22,10,10,0.55)',backdropFilter:'blur(24px) saturate(1.2)',WebkitBackdropFilter:'blur(24px) saturate(1.2)',border:'1px solid rgba(200,60,60,0.12)',borderRadius:20,boxShadow:'0 8px 48px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04)'}}>
        <div style={{padding:'52px 48px',width:400}}>
          {/* Logo */}
          <div style={{textAlign:'center',marginBottom:40}}>
            <div style={{fontSize:36,fontWeight:900,letterSpacing:'0.12em',fontFamily:'Inter,sans-serif',marginBottom:8,background:'linear-gradient(180deg,#f0d0d0 0%,#D44040 100%)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text',filter:'drop-shadow(0 0 20px rgba(212,64,64,0.4))'}}>VANTAGE</div>
            <div style={{width:100,height:1,background:'linear-gradient(90deg,transparent,rgba(212,64,64,0.5),transparent)',margin:'0 auto 16px'}}/>
            <div style={{fontSize:11,color:'rgba(228,160,160,0.6)',letterSpacing:'0.25em',fontFamily:'Inter,sans-serif'}}>Q1 2026 OKR REVIEW</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,0.2)',letterSpacing:'0.15em',fontFamily:'Inter,sans-serif',marginTop:5}}>AUTHORIZED ACCESS ONLY</div>
          </div>

          {loading?(
            <div style={{textAlign:'center',padding:'30px 0 10px'}}>
              <div style={{width:40,height:40,borderRadius:'50%',border:'2px solid rgba(212,64,64,0.15)',borderTopColor:'rgba(212,64,64,0.7)',animation:'ldrSpin 0.8s linear infinite',margin:'0 auto 24px'}}/>
              <div style={{fontSize:13,color:'rgba(228,160,160,0.6)',letterSpacing:'0.08em'}}>{loadProgress}</div>
            </div>
          ):(
            <>
              {/* Error */}
              <div style={{fontSize:12,color:'#E8585A',marginBottom:12,textAlign:'center',opacity:error?1:0,transition:'opacity 0.3s',height:error?20:0,overflow:'hidden'}}>
                Invalid credentials. Please try again.
              </div>

              {/* Inputs */}
              <input className={`login-input${error?' error':''}`} type="text" placeholder="Username" value={user}
                onChange={e=>setUser(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter')passRef.current?.focus();}}
                style={{marginBottom:12}}/>
              <input ref={passRef} className={`login-input${error?' error':''}`} type="password" placeholder="Password" value={pass}
                onChange={e=>setPass(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter')submit();}}
                style={{marginBottom:28}}/>

              {/* Submit button */}
              <button onClick={submit}
                style={{width:'100%',padding:'14px',borderRadius:10,border:'1px solid rgba(212,64,64,0.3)',background:'linear-gradient(135deg,rgba(160,25,25,0.8),rgba(212,64,64,0.6))',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',transition:'all 0.3s cubic-bezier(0.16,1,0.3,1)',fontFamily:'Inter,sans-serif',letterSpacing:'0.05em'}}
                onMouseEnter={e=>{e.currentTarget.style.background='linear-gradient(135deg,rgba(200,30,30,0.9),rgba(232,88,90,0.7))';e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 4px 20px rgba(212,64,64,0.2)';}}
                onMouseLeave={e=>{e.currentTarget.style.background='linear-gradient(135deg,rgba(160,25,25,0.8),rgba(212,64,64,0.6))';e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='none';}}>
                Sign In
              </button>

              {/* Default credentials hint */}
              <div style={{fontSize:10,color:'rgba(228,160,160,0.35)',textAlign:'center',marginTop:20,letterSpacing:'0.05em',lineHeight:1.8}}>
                <span style={{color:'rgba(228,160,160,0.5)'}}>Default:</span> vantage / vantage
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

  const containerRef=useRef(null);
  const[visible,setVisible]=useState(false);

  useEffect(()=>{
    const v=vidRef.current;if(!v)return;
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting&&!visible){
          setVisible(true);
          v.play().catch(()=>{});
        }
      });
    },{threshold:0.3});
    obs.observe(v);
    return ()=>obs.disconnect();
  },[visible]);

  // Footer video sound: unmute when visible, mute when not
  useEffect(()=>{
    const el=containerRef.current;const v=vidRef.current;if(!el||!v)return;
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting){v.muted=false;v.volume=0.3;}
        else{v.muted=true;}
      });
    },{threshold:0.3});
    obs.observe(el);
    return()=>obs.disconnect();
  },[]);

  useEffect(()=>{
    const v=vidRef.current;if(!v||!visible)return;
    let replayTimer=null;
    const onTime=()=>{
      if(v.duration&&v.currentTime>=v.duration-0.1){
        v.pause();
        v.currentTime=v.duration-0.05;
        v.removeEventListener('timeupdate',onTime);
        replayTimer=setTimeout(()=>{
          v.currentTime=0;
          v.play().catch(()=>{});
          v.addEventListener('timeupdate',onTime);
        },5000);
      }
    };
    v.addEventListener('timeupdate',onTime);
    return ()=>{v.removeEventListener('timeupdate',onTime);if(replayTimer)clearTimeout(replayTimer);};
  },[visible]);

  return(
    <div ref={containerRef} style={{position:'relative',width:'100%',height:'100vh',overflow:'hidden'}}>
      <video ref={vidRef} src="footer-bg.mp4" muted playsInline preload="auto"
        style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',zIndex:1}}/>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at center,transparent 40%,rgba(10,6,6,0.6) 70%,rgba(10,6,6,0.95) 100%)',pointerEvents:'none',zIndex:2}}/>
    </div>
  );
}

                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:10,background:'rgba(255,255,255,0.02)',border:`1px solid ${detailBorder}`}}>
                                  <span style={{fontSize:12,color:T.textBody,fontFamily:T.font.cn}}>样品交付</span>
                                  <span style={{fontSize:14,fontWeight:600,color:T.text,fontFamily:T.font.mono}}>{p.sampleDate}</span>
                                </div>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:10,background:'rgba(255,255,255,0.02)',border:`1px solid ${detailBorder}`}}>
                                  <span style={{fontSize:12,color:T.textBody,fontFamily:T.font.cn}}>正式生产</span>
                                  <span style={{fontSize:14,fontWeight:600,color:T.text,fontFamily:T.font.mono}}>{p.massDate}</span>
                                </div>
                              </div>
                            </div>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:12,borderTop:`1px solid ${detailBorder}`}}>
                              <span style={{fontSize:9,color:'rgba(255,255,255,0.2)',fontFamily:T.font.mono,letterSpacing:'0.06em'}}>{p.id}</span>
                              <div style={{display:'flex',alignItems:'center',gap:6}}>
                                <div style={{width:6,height:6,borderRadius:'50%',background:T.accent,animation:'pulse 2s ease-in-out infinite'}}/>
                                <span style={{fontSize:9,color:'rgba(255,255,255,0.3)',fontFamily:T.font.mono,letterSpacing:'0.04em'}}>LIVE PREVIEW</span>
                              </div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </DSec>}

                  {/* Results */}
                  {item.results&&<DSec title="Q1 结果产出 Results" icon={I.check}>
                    <div style={{padding:24,borderRadius:16,background:'rgba(74,222,128,0.03)',border:'1px solid rgba(74,222,128,0.1)'}}>
                      <div style={{whiteSpace:'pre-wrap',fontSize:14,lineHeight:1.8,color:T.textBody,fontFamily:T.font.cn}}><Ed readOnly={ro}>{item.results}</Ed></div>
                    </div>
                  </DSec>}

                  {/* Success */}
                  {item.success&&<DSec title="做得好的地方 Success" icon={I.light}>
                    <div style={{padding:24,borderRadius:16,background:'rgba(251,191,36,0.03)',border:'1px solid rgba(251,191,36,0.1)'}}>
                      <div style={{whiteSpace:'pre-wrap',fontSize:14,lineHeight:1.8,color:T.textBody,fontFamily:T.font.cn}}><Ed readOnly={ro}>{item.success}</Ed></div>
                    </div>
                  </DSec>}

                  {/* Problems */}
                  {item.problems&&<DSec title="发现的问题 Problems" icon={I.warn}>
                    <div style={{padding:24,borderRadius:16,background:'rgba(239,68,68,0.03)',border:'1px solid rgba(239,68,68,0.1)'}}>
                      <div style={{whiteSpace:'pre-wrap',fontSize:14,lineHeight:1.8,color:T.textBody,fontFamily:T.font.cn}}><Ed readOnly={ro}>{item.problems}</Ed></div>
                    </div>
                  </DSec>}

                  {/* Improvement */}
                  {item.improvement&&<DSec title="改进方向 Improvement" icon={I.bolt}>
                    <div style={{padding:24,borderRadius:16,background:'rgba(212,64,64,0.03)',border:'1px solid rgba(212,64,64,0.1)'}}>
                      <div style={{whiteSpace:'pre-wrap',fontSize:14,lineHeight:1.8,color:T.textBody,fontFamily:T.font.cn}}><Ed readOnly={ro}>{item.improvement}</Ed></div>
                    </div>
                  </DSec>}

                  {/* Quarterly */}
                  {item.quarterly&&<DSec title="季度路线图 Quarterly Roadmap" icon={I.cal}>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                      {item.quarterly.split('\n').filter(l=>l.trim()).map((q,qi)=>(
                        <div key={qi} style={{padding:20,borderRadius:16,background:detailBg,border:`1px solid ${detailBorder}`,transition:'border-color 0.3s'}}
                          onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(212,64,64,0.2)'}
                          onMouseLeave={e=>e.currentTarget.style.borderColor=detailBorder}>
                          <div style={{whiteSpace:'pre-wrap',fontSize:13,lineHeight:1.6,color:'rgba(255,255,255,0.6)',fontFamily:T.font.cn}}>{q}</div>
                        </div>
                      ))}
                    </div>
                  </DSec>}
                </div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ═══ App ═══
function App(){
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem('vantage-auth')==='ok');
  const [lightboxSrc,setLightboxSrc]=useState(null);
  const [activeSection,setActiveSection]=useState('o1');
  const [data,setData]=useState(getInitialData);
  const [editMode,setEditMode]=useState(false);
  const [showConfirm,setShowConfirm]=useState(false);
  const addHeroKpi=(kpi)=>setData(p=>({...p,heroKpis:[...p.heroKpis,{value:kpi?.value||'—',label:kpi?.label||'NEW KPI'}]}));
  const delHeroKpi=idx=>setData(p=>({...p,heroKpis:p.heroKpis.filter((_,i)=>i!==idx)}));
  const saveData=()=>{localStorage.setItem('okr-save',document.documentElement.outerHTML);};
  const handleRequestExit=()=>setShowConfirm(true);
  const handleConfirmSave=()=>{saveData();setEditMode(false);setShowConfirm(false);};
  const handleConfirmDiscard=()=>{setData(getInitialData());setEditMode(false);setShowConfirm(false);};

  useEffect(()=>{
    if(!authed)return;
    const sections=document.querySelectorAll('section[id]');
    const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');setActiveSection(e.target.id);}});},{rootMargin:'-5% 0px -50% 0px',threshold:0.03});
    sections.forEach(s=>obs.observe(s));return()=>obs.disconnect();
  },[authed]);

  if(!authed) return <LoginOverlay onLogin={()=>setAuthed(true)}/>;

  return(
    <div className={editMode?'edit-mode-on':''}>
      <HeroSection key="hero-post-login" data={data} editMode={editMode} setData={setData} addHeroKpi={addHeroKpi} delHeroKpi={delHeroKpi}/>
      <TopNav active={activeSection}/>
      {/* Section image — 40px from hero video, with vignette */}
      <div style={{maxWidth:1400,margin:'0 auto',padding:'0 60px',marginTop:40,position:'relative'}}>
        <img src="section-image.jpg" style={{width:'100%',display:'block',borderRadius:8}}/>
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at center,transparent 30%,rgba(10,6,6,0.4) 70%,rgba(10,6,6,0.8) 100%)',borderRadius:8,pointerEvents:'none'}}/>
      </div>
      <DashboardSection editMode={editMode}/>
      <main style={{maxWidth:1400,margin:'0 auto',padding:'30px 60px 120px'}}>
        <NestedOKRSection objectives={data.objectives} editMode={editMode} lightboxSrc={lightboxSrc} setLightboxSrc={setLightboxSrc}/>
      </main>

      {/* Thank You image — above footer video, with vignette */}
      <div style={{maxWidth:1400,margin:'0 auto',padding:'0 60px',marginBottom:50,position:'relative'}}>
        <img src="thankyou-image.jpg" style={{width:'100%',display:'block',borderRadius:8}}/>
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at center,transparent 30%,rgba(10,6,6,0.4) 70%,rgba(10,6,6,0.8) 100%)',borderRadius:8,pointerEvents:'none'}}/>
      </div>

      {/* Footer video — fullscreen, auto-play on scroll, freeze on last frame */}
      <div style={{position:'relative',width:'100vw',left:'calc(-50vw + 50%)',overflow:'hidden'}}>
        <FooterVideo />
      </div>

      {/* Footer metadata — moved to bottom */}
      <div style={{width:'100%',padding:'40px 0 32px',background:'#0a0a0a',textAlign:'center'}}>
        <div style={{fontSize:12,color:'rgba(200,60,60,0.6)',fontFamily:T.font.en,letterSpacing:'0.08em'}}><Ed readOnly={!editMode}>{data.date}</Ed> · 机密 · 仅限内部使用</div>
        <div style={{fontSize:11,color:'rgba(100,100,100,0.4)',fontFamily:T.font.en,marginTop:8}}>Next Review: <Ed readOnly={!editMode}>{data.nextReviewDate}</Ed> (Q2 Review)</div>
      </div>

      <SaveBar editMode={editMode} onToggleEdit={()=>setEditMode(true)} onRequestExit={handleRequestExit}/>
      {showConfirm&&<ConfirmDialog onSave={handleConfirmSave} onDiscard={handleConfirmDiscard} onCancel={()=>setShowConfirm(false)}/>}
      {lightboxSrc&&<ImagePreview src={lightboxSrc} onClose={()=>setLightboxSrc(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
